<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf=8">
        <meta name="viewpoint" content="width=device-width">
        <title>media files</title>
    </head>
    <body>
        <h2>Welcome to media coding!</h2>
        <p>Here is one of my favourite plants</p>
             <center>
                <img src="plant.jpg" alt="plants" width="500" height="500">
            </center>
        <p>This is one of my favourite songs</p>
        <audio controls autoplay>
            <source src="Song.mp3" type="audio/mpeg">
        </audio>
            <center>
                <p>Using Iframe you can use any online video in your project</p>
                <iframe width="500" height="400" src="https://www.youtube.com/embed/lsCObbRG370?autoplay=1&mute=1"
                allowfullscreen>
                </iframe>
            </center>
    </body>
</html>
